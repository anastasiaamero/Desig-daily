<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Design Daily</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000' width='100' height='100'/><text y='.85em' x='50%' text-anchor='middle' font-size='70' fill='white'>D</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --muted: #666666;
            --gray: #d9d9d9;
        }
        
        html {
            background: var(--bg);
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--fg);
            font-size: 16px;
            line-height: 1.5;
            overflow-x: hidden;
        }
        
        html {
            background: var(--bg);
        }
        
        /* Splash Screen */
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }
        
        .splash.hidden {
            display: none;
        }
        
        .splash-text {
            font-size: 16px;
            font-weight: 400;
            text-align: center;
            margin-bottom: 2rem;
            min-height: 1.5rem;
        }
        
        .splash-text .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--fg);
            margin-left: 2px;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* 3D Cards Container */
        .cards-3d {
            position: relative;
            width: 200px;
            height: 200px;
            perspective: 800px;
            margin-bottom: 2rem;
        }
        
        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotateCarousel 12s linear infinite;
        }
        
        .card-3d {
            position: absolute;
            left: 50%;
            top: 50%;
            margin-left: -60px;
            margin-top: -75px;
            width: 120px;
            height: 150px;
            background: transparent !important;
            border-radius: 0 !important;
            transform-style: preserve-3d;
            will-change: transform;
        }
        
        .card-3d img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: transparent !important;
            border-radius: 0 !important;
        }
        
        @keyframes rotateCarousel {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(-360deg);
            }
        }
        
        /* Main Scroll Section */
        .main {
            padding: 60px 16px 80px;
            max-width: 28rem;
            margin: 0 auto;
            width: 100%;
        }
        
        .bottom-bar {
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }
        
        /* Card */
        .card-image {
            aspect-ratio: 4/3;
            max-height: 35vh;
            margin-bottom: 0.5rem;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            flex-shrink: 0;
        }
        
        .card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }
        
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .card-image img.loaded { opacity: 1; }
        
        .card-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            font-weight: 700;
            color: rgba(0,0,0,0.08);
        }
        
        .card-image img.loaded + .card-placeholder { display: none; }
        
        /* Title */
        .title {
            font-weight: 900;
            font-size: 1.5rem;
            line-height: 1.1;
            letter-spacing: -0.01em;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
            -webkit-text-stroke: 0.5px var(--fg);
            flex-shrink: 0;
        }

        .description {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 0.25rem;
            flex-shrink: 0;
        }
        
        /* Wiki extract */
        .wiki-extract {
            font-size: 12px;
            font-weight: 400;
            line-height: 1.4;
            color: var(--muted);
            margin-top: 0.25rem;
            margin-bottom: 0.5rem;
            display: none;
        }
        
        .wiki-extract.visible { display: block; }
        
        .wiki-link {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 12px;
            font-weight: 400;
            color: var(--fg);
            text-decoration: none;
        }
        
        .wiki-link:hover { text-decoration: underline; }
        
        .bottom-left {
            display: flex;
            flex-direction: column;
        }
        
        .year-category {
            font-weight: 700;
            font-size: 1.25rem;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            cursor: pointer;
            text-decoration: none;
            color: var(--fg);
            display: block;
        }

        .year-category:hover { opacity: 0.7; }

        .category { margin-bottom: 0; }
        
        .next-btn {
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            border: 2px solid var(--fg);
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .next-btn:hover { background: var(--fg); }
        .next-btn:hover svg { color: var(--bg); }
        .next-btn svg { width: 1.5rem; height: 1.5rem; color: var(--fg); transition: color 0.2s; }
        
        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 1rem;
            padding-top: max(1rem, env(safe-area-inset-top));
            background: var(--bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .menu-btn {
            width: 2.25rem;
            height: 2.25rem;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .menu-btn svg { width: 1.5rem; height: 1.5rem; color: var(--fg); }
        
        .menu-btn-light {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2.25rem;
            height: 2.25rem;
        }
        
        .menu-btn-light svg { color: white; }
        
        .lang-toggle {
            font-weight: 700;
            font-size: 16px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--fg);
        }
        
        .lang-toggle-light {
            color: white;
        }
        
        /* Menu Overlay */
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: var(--fg);
            z-index: 40;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            padding-top: max(1rem, env(safe-area-inset-top));
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .menu-title {
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: white;
            text-align: right;
        }
        
        .menu-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
        }
        
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .menu-item {
            display: flex;
            gap: 1rem;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            width: 100%;
            perspective: 1000px;
        }
        
        .menu-item-inner {
            display: flex;
            gap: 1rem;
            background: none;
            width: 100%;
            transition: transform 0.3s ease;
            transform-style: preserve-3d;
        }
        
        .menu-item:hover .menu-item-inner {
            transform: translateZ(20px) rotateX(5deg);
        }
        
        .menu-item-image {
            width: 4rem;
            height: 5rem;
            flex-shrink: 0;
            background: var(--gray);
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }
        
        .menu-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
        
        .menu-item-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: rgba(0,0,0,0.1);
        }
        
        .menu-item-image img.loaded + .menu-item-placeholder { display: none; }
        
        .menu-item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
        }
        
        .menu-item-num {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.25rem;
        }
        
        .menu-item-title {
            font-weight: 700;
            font-size: 16px;
            color: white;
            margin-bottom: 0.25rem;
        }
        
        .menu-item-meta {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }
        
         ::-webkit-scrollbar { display: none; }

        /* Splash Screen 1: Loader */
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }

        .splash.hidden {
            display: none;
        }

        /* Splash Screen 2: Tap to Start */
        .tap-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 0.5rem;
        }

        .tap-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            color: var(--fg);
            animation: pulse 2s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .tap-subtitle {
            font-size: 14px;
            text-align: center;
            color: var(--muted);
            line-height: 1.3;
        }

        .tap-copyright {
            position: absolute;
            bottom: 2rem;
            font-size: 12px;
            text-align: center;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <!-- Splash Screen 1: Loader -->
    <div class="splash" id="splashLoader">
        <div class="splash-text" id="splashText"></div>
        <div class="cards-3d" id="cards3d">
            <div class="carousel" id="carousel">
                <div class="card-3d"><img id="card1" alt=""></div>
                <div class="card-3d"><img id="card2" alt=""></div>
                <div class="card-3d"><img id="card3" alt=""></div>
                <div class="card-3d"><img id="card4" alt=""></div>
                <div class="card-3d"><img id="card5" alt=""></div>
                <div class="card-3d"><img id="card6" alt=""></div>
                <div class="card-3d"><img id="card7" alt=""></div>
            </div>
        </div>
    </div>

    <!-- Splash Screen 2: Tap to Start -->
    <div class="splash hidden" id="splashRoulette">
        <div class="tap-container">
            <p class="tap-title">TAP HERE</p>
            <p class="tap-subtitle">Random design<br>project</p>
            <p class="tap-copyright">©anastasiaamero</p>
        </div>
    </div>
    
    <!-- Header -->
    <div class="header">
        <button class="menu-btn" id="menuBtn" aria-label="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <button class="lang-toggle" id="langToggle">En/Ru</button>
    </div>
    
    <!-- Main -->
    <main class="main">
        <div class="card-image" id="cardImage">
            <div class="card-inner">
                <img id="cardImg" alt="">
                <div class="card-placeholder" id="cardPlaceholder"></div>
            </div>
        </div>
        
        <h1 class="title" id="workTitle"></h1>
        <p class="description" id="workDescription"></p>
        
        <div class="wiki-extract" id="wikiExtract">
            <p id="wikiText"></p>
            <a href="#" target="_blank" class="wiki-link" id="wikiLink">Read on Wikipedia →</a>
        </div>
        
        <div class="bottom-bar">
            <div class="bottom-left">
                <a href="#" target="_blank" class="year-category" id="workYear"></a>
                <a href="#" target="_blank" class="year-category category" id="workCategory"></a>
            </div>
            <button class="next-btn" id="nextBtn" aria-label="Next work">
                <svg viewBox="0 0 32 22" fill="none">
                    <path d="M0 11H30M22 1L31 11L22 21" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </main>
    

    
    <!-- Menu Overlay -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-header">
            <button class="menu-btn menu-btn-light" id="menuBtnOverlay" aria-label="Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="3">
                    <line x1="3" y1="6" x2="21" y2="6" stroke="white"/>
                    <line x1="3" y1="18" x2="21" y2="18" stroke="white"/>
                </svg>
            </button>
            <button class="lang-toggle lang-toggle-light" id="langToggle">En/Ru</button>
        </div>
        <div class="menu-content">
            <div class="menu-grid" id="menuList"></div>
        </div>
    </div>
    
    <script>
        const works = [
            { id: 2, title: "Neue Haas Grotesk", artist: "Max Miedinger", year: 1957, category: "Typography", wikiSearch: "Helvetica", description: "The typeface that would later become Helvetica. A masterpiece of Swiss design.", description_ru: "Шрифт, который позже станет Helvetica. Шедевр швейцарского дизайна.", wiki: "Neue Haas Grotesk is a sans-serif typeface originally released by the Haas Type Foundry in 1957. It was later renamed Helvetica and became one of the most widely used typefaces in the world." },
            { id: 3, title: "Eames Lounge Chair", artist: "Charles & Ray Eames", year: 1956, category: "Product Design", wikiSearch: "Eames Lounge Chair", description: "The perfect marriage of form and function. Revolutionized furniture design.", description_ru: "Идеальное сочетание формы и функции. Революция в дизайне мебели.", wiki: "The Eames Lounge Chair and Ottoman were designed by Charles and Ray Eames for Herman Miller. It features a molded plywood shell with leather upholstery, combining luxurious comfort with modern aesthetics." },
            { id: 4, title: "Vitra Fire Station", artist: "Zaha Hadid", year: 1993, category: "Architecture", wikiSearch: "Vitra Fire Station", description: "Hadid's first completed building. A dramatic concrete structure.", description_ru: "Первое завершённое здание Хадид. Драматическая бетонная конструкция.", wiki: "The Vitra Fire Station is located in Weil am Rhein, Germany. Designed by Zaha Hadid, it features dramatic angular concrete forms that appear to shoot upward like flames." },
            { id: 5, title: "IBM Logo", artist: "Paul Rand", year: 1972, category: "Graphic Design", wikiSearch: "IBM logo", description: "Eight-bar striped IBM logo. A timeless symbol of technological precision.", description_ru: "Восьмиполосный логотип IBM. Вневременной символ точности.", wiki: "Paul Rand redesigned the IBM logo in 1972, creating the iconic striped version with eight horizontal lines representing speed and efficiency." },
            { id: 6, title: "iPod", artist: "Apple Design Team", year: 2001, category: "Product Design", wikiSearch: "iPod", description: "The device that changed how we listen to music.", description_ru: "Устройство, изменившее способ слушать музыку.", wiki: "The iPod was introduced by Apple in October 2001. Its intuitive Click Wheel interface and 1,000 song capacity revolutionized portable music players." },
            { id: 7, title: "WWF Panda Logo", artist: "Sir Peter Scott", year: 1961, category: "Graphic Design", wikiSearch: "World Wildlife Fund panda", description: "One of the simplest and most recognized logos in the world.", description_ru: "Один из самых простых и узнаваемых логотипов.", wiki: "The World Wildlife Fund logo features a giant panda created by Sir Peter Scott. The simplicity of the design, using only black and white, made it instantly recognizable and has remained largely unchanged since 1961." },
            { id: 8, title: "Barcelona Pavilion", artist: "Mies van der Rohe", year: 1929, category: "Architecture", wikiSearch: "Barcelona Pavilion", description: "Less is more. Redefined modern architecture.", description_ru: "Меньше — значит больше. Переопределила современную архитектуру.", wiki: "The Barcelona Pavilion was designed by Ludwig Mies van der Rohe for the 1929 International Exposition. The building is considered one of the most influential works of modern architecture, embodying the principle 'less is more' through its use of steel, glass, and marble." },
            { id: 9, title: "Spotify Brand", artist: "Spotify Design Team", year: 2015, category: "Graphic Design", wikiSearch: "Spotify", description: "The green sound wave that became a cultural icon.", description_ru: "Зелёная звуковая волна, ставшая культурной иконой.", wiki: "Spotify is a Swedish audio streaming service launched in 2008. The brand identity, developed by critical-mass, features a distinctive green color and sound wave motif. By 2021, Spotify had over 400 million monthly active users." },
            { id: 10, title: "Braun SK 4", artist: "Dieter Rams", year: 1956, category: "Product Design", wikiSearch: "Braun SK 4", description: "Called 'Snow White's coffin'. Established principles of good design.", description_ru: "«Гроб Белоснежки». Установил принципы хорошего дизайна.", wiki: "The Braun SK 4 is a record player designed by Hans Gugelot and Dieter Rams in 1956. Its innovative design, featuring an open lid resembling a coffin, earned it the nickname 'Snow White's Coffin'. It was among the first products to embody what would become known as functionalist design." },
            { id: 11, title: "Moscow Metro Posters", artist: "Alexander Rodchenko", year: 1928, category: "Graphic Design", wikiSearch: "Alexander Rodchenko", description: "Constructivist posters that brought avant-garde art to the streets.", description_ru: "Конструктивистские плакаты, принёсшие авангард на улицы.", wiki: "Alexander Rodchenko was a Russian painter, photographer, and graphic artist who became a leading figure in Constructivism. His advertising work for the Moscow Metro, GUM, and Gosudarstvennoye Izdatel'stvo featured bold diagonal compositions, photomontage, and bright colors that brought avant-garde aesthetics to mass communications." },
            { id: 12, title: "Dyson AirMultiplier", artist: "James Dyson", year: 2009, category: "Product Design", wikiSearch: "Dyson Air Multiplier", description: "Engineering as design. A product that looks like sculpture.", description_ru: "Инженерия как дизайн. Продукт, похожий на скульптуру.", wiki: "The Dyson Air Multiplier is a bladeless fan designed by James Dyson. Using Air Multiplier technology, it draws air into the loop and amplifies it twelvefold, producing a smooth stream of uninterrupted air. The design, resembling a sculptural hoop, eliminated the fast-spinning blades of traditional fans." },
            { id: 13, title: "WeTransfer Identity", artist: "WeTransfer Studio", year: 2018, category: "Graphic Design", wikiSearch: "WeTransfer", description: "Pink and black palette. Synonymous with creative work.", description_ru: "Розово-чёрная палитра. Синоним креативной работы.", wiki: "WeTransfer launched in 2012 as a file transfer service. The brand gained recognition for its distinctive pink and black color scheme and creative campaigns. In 2018, they launched WeTransfer Ads, featuring works by artists and designers, further cementing the brand's association with creativity." },
            { id: 14, title: "TWA Terminal", artist: "Eero Saarinen", year: 1962, category: "Architecture", wikiSearch: "TWA Flight Center", description: "Flying saucer meets cathedral. Made air travel feel like adventure.", description_ru: "Летающая тарелка встречается с собором.", wiki: "The TWA Flight Center at JFK Airport was designed by Eero Saarinen and opened in 1962. Its sweeping, wing-like roof, inspired by bird flight, created an interior that made air travel feel glamorous and futuristic. It was designated a New York City landmark in 1994." },
            { id: 15, title: "Venmo Brand", artist: "Venmo Design", year: 2018, category: "Graphic Design", wikiSearch: "Venmo", description: "Making money feel human. Transformed financial transactions.", description_ru: "Деньги как общение. Трансформация финансовых транзакций.", wiki: "Venmo is a mobile payment app owned by PayPal. The brand is known for its social feed where users can see friends' transactions, often with witty notes. The iconic blue and white color scheme and the distinctive 'V' logo have made it instantly recognizable among younger generations." },
            { id: 16, title: "Porsche 911", artist: "Ferdinand Porsche", year: 1963, category: "Product Design", wikiSearch: "Porsche 911", description: "The car that defined the sports car.", description_ru: "Автомобиль, определивший спортивный автомобиль.", wiki: "The Porsche 911 was introduced at the 1963 Frankfurt Motor Show. Initially called the 901, it was renamed 911 after Peugeot protested the use of three-digit numbers with a zero in the middle. The car's distinctive silhouette, with its rear-engine layout, has remained largely consistent for over 60 years." },
            { id: 17, title: "Tokyo Olympics Pictograms", artist: "Katsumi Asaba", year: 1964, category: "Graphic Design", wikiSearch: "1964 Summer Olympics pictograms", description: "The first truly modern Olympic pictograms.", description_ru: "Первые современные олимпийские пиктограммы.", wiki: "The 1964 Tokyo Olympics introduced the first systematic set of Olympic pictograms. Designed by Yoshinobu Ishihara and adapted by Yusaku Kamekura, these graphic symbols communicated sporting events across language barriers and became a model for all future Olympic Games visual identity systems." },
            { id: 18, title: "Frog Design", artist: "Hartmut Esslinger", year: 1969, category: "Product Design", wikiSearch: "frog design", description: "German precision in Silicon Valley.", description_ru: "Немецкая точность в Силиконовой долине.", wiki: "frog (short for 'Federal Republic of Germany') was founded by Hartmut Esslinger in 1969. The design studio pioneered 'deep grey' design for Apple computers in the 1980s, creating a unified visual language that influenced the tech industry's approach to industrial design." },
            { id: 19, title: "Bloomberg Businessweek", artist: "Bloomberg Design", year: 2012, category: "Editorial", wikiSearch: "Bloomberg Businessweek", description: "Bold typography and unexpected layouts.", description_ru: "Смелая типографика и неожиданные раскладки.", wiki: "Bloomberg Businessweek underwent a radical redesign in 2012 under creative director Wyeth McGowan. The new design featured oversized photography, bold typography, and unconventional layouts that broke from traditional business magazine conventions. The redesign won numerous awards and circulation increased significantly." },
            { id: 20, title: "Dieter Rams Principles", artist: "Dieter Rams", year: 1970, category: "Graphic Design", wikiSearch: "Dieter Rams", description: "Ten principles for good design.", description_ru: "Десять принципов хорошего дизайна.", wiki: "Dieter Rams formulated his ten principles for good design while working at Braun. These principles, including 'good design is as little design as possible' and 'good design is honest', became influential guidelines for designers worldwide and have been widely cited in discussions about minimalist and functional design." }
        ];
        
        let currentIndex = Math.floor(Math.random() * works.length);
        let lang = 'en';
        let menuOpen = false;
        
        const cardImg = document.getElementById('cardImg');
        const cardPlaceholder = document.getElementById('cardPlaceholder');
        const workTitle = document.getElementById('workTitle');
        const workDescription = document.getElementById('workDescription');
        const workYear = document.getElementById('workYear');
        const workCategory = document.getElementById('workCategory');
        const wikiExtract = document.getElementById('wikiExtract');
        const wikiText = document.getElementById('wikiText');
        const wikiLink = document.getElementById('wikiLink');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuList = document.getElementById('menuList');
        const splashText = document.getElementById('splashText');
        const cards3d = document.getElementById('cards3d');
        
        const imageCache = {};
        
        const localImages = {
            'Neue Haas Grotesk': 'images/helvetica.jpg',
            'Eames Lounge Chair': 'images/eames.jpg',
            'Vitra Fire Station': 'images/vitra-fire-station.jpg',
            'IBM Logo': 'images/ibm.jpg',
            'iPod': 'images/ipod.png',
            'WWF Panda Logo': 'images/panda.jpg',
            'Barcelona Pavilion': 'images/barcelona-pavilion.jpg',
            'Spotify Brand': 'images/smartphone.jpg',
            'Braun SK 4': 'images/dieter-rams.jpg',
            'Moscow Metro Posters': 'images/rodchenko.jpg',
            'Dyson AirMultiplier': 'images/dyson.jpg',
            'WeTransfer Identity': 'images/wetransfer.png',
            'TWA Terminal': 'images/twa-terminal.jpg',
            'Venmo Brand': 'images/smartphone.jpg',
            'Porsche 911': 'images/porsche-911.jpg',
            'Tokyo Olympics Pictograms': 'images/tokyo-1964.png',
            'Frog Design': 'images/frog-design.jpg',
            'Bloomberg Businessweek': 'images/bloomberg.jpg',
            'Dieter Rams Principles': 'images/dieter-rams.jpg'
        };
        
        async function fetchWikipediaData(searchQuery) {
            if (imageCache[searchQuery]) return imageCache[searchQuery];
            
            try {
                const response = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(searchQuery)}&prop=pageimages|extracts&pithumbsize=800&exintro=1&explaintext=1&format=json&origin=*`);
                const data = await response.json();
                const pages = data.query?.pages;
                if (pages) {
                    for (const pageId in pages) {
                        const page = pages[pageId];
                        if (pageId !== '-1' && page.thumbnail) {
                            const result = {
                                image: page.thumbnail.source,
                                extract: page.extract || '',
                                pageUrl: `https://en.wikipedia.org/wiki/${encodeURIComponent(page.title)}`
                            };
                            imageCache[searchQuery] = result;
                            return result;
                        }
                    }
                }
                
                const searchResponse = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchQuery)}&format=json&origin=*`);
                const searchData = await searchResponse.json();
                if (searchData.query?.search?.[0]) {
                    return fetchWikipediaData(searchData.query.search[0].title);
                }
            } catch (error) {
                console.warn('Wikipedia fetch failed:', error);
            }
            return null;
        }
        
        async function renderWork(index) {
            const work = works[index];
            workTitle.textContent = work.title;
            workDescription.textContent = lang === 'en' ? work.description : work.description_ru;
            workYear.textContent = work.year;
            workCategory.textContent = work.category.replace(/\s/g, '');
            
            cardImg.classList.remove('loaded');
            cardPlaceholder.textContent = work.title[0];
            
            let imageSrc = localImages[work.title] || null;
            let wikiExtractText = '';
            
            try {
                const response = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(work.wikiSearch)}&prop=extracts&exintro=1&explaintext=1&format=json&origin=*`);
                const data = await response.json();
                const pages = data.query?.pages;
                if (pages) {
                    for (const pageId in pages) {
                        const page = pages[pageId];
                        if (pageId !== '-1' && page.extract) {
                            wikiExtractText = page.extract.length > 400 
                                ? page.extract.substring(0, 400) + '...' 
                                : page.extract;
                            wikiLink.href = `https://en.wikipedia.org/wiki/${encodeURIComponent(page.title)}`;
                            break;
                        }
                    }
                }
            } catch (error) {
                console.warn('Wikipedia fetch failed:', error);
            }
            
            if (localImages[work.title]) {
                imageSrc = localImages[work.title];
            }
            
            if (wikiExtractText) {
                wikiText.textContent = wikiExtractText;
                wikiExtract.classList.add('visible');
            } else if (work.wiki) {
                const wikiShort = work.wiki.length > 400 ? work.wiki.substring(0, 400) + '...' : work.wiki;
                wikiText.textContent = wikiShort;
                wikiExtract.classList.add('visible');
            } else {
                wikiExtract.classList.remove('visible');
            }
            
            if (imageSrc) {
                cardImg.src = imageSrc;
                cardImg.onload = () => cardImg.classList.add('loaded');
                cardImg.onerror = () => cardPlaceholder.textContent = work.title[0];
            } else {
                cardPlaceholder.textContent = work.title[0];
            }
        }
        
        function renderMenu() {
            menuList.innerHTML = works.map((work, index) => `
                <button class="menu-item" data-index="${index}">
                    <div class="menu-item-inner">
                        <div class="menu-item-image">
                            <img src="${localImages[work.title] || imageCache[work.wikiSearch]?.image || ''}" alt="" loading="lazy" onload="this.classList.add('loaded')">
                            <div class="menu-item-placeholder">${work.title[0]}</div>
                        </div>
                        <div class="menu-item-info">
                            <span class="menu-item-num">${String(index + 1).padStart(2, '0')}</span>
                            <p class="menu-item-title">${work.title}</p>
                            <p class="menu-item-meta">${work.artist}, ${work.year}</p>
                        </div>
                    </div>
                </button>
            `).join('');
            
            menuList.querySelectorAll('.menu-item').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentIndex = parseInt(btn.dataset.index);
                    renderWork(currentIndex);
                    toggleMenu();
                });
            });
            
            document.querySelectorAll('.menu-item-image img').forEach(img => {
                if (img.complete && img.naturalWidth > 0) {
                    img.classList.add('loaded');
                }
            });
        }
        
        function toggleMenu() {
            menuOpen = !menuOpen;
            menuOverlay.classList.toggle('active', menuOpen);
            document.body.style.overflow = menuOpen ? 'hidden' : '';
            document.querySelector('.header').style.display = menuOpen ? 'none' : 'flex';
            
            if (menuOpen) {
                renderMenu();
                init3DHover();
            }
        }
        
        function init3DHover() {
            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('mousemove', (e) => {
                    const rect = item.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 15;
                    const rotateY = (x - centerX) / 15;
                    
                    const inner = item.querySelector('.menu-item-inner');
                    if (inner) {
                        inner.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(30px) translateX(10px)`;
                    }
                });
                
                item.addEventListener('mouseleave', () => {
                    const inner = item.querySelector('.menu-item-inner');
                    if (inner) {
                        inner.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateZ(0) translateX(0)';
                    }
                });
            });
        }
        
        document.getElementById('menuBtn').addEventListener('click', toggleMenu);
        document.getElementById('menuBtnOverlay').addEventListener('click', toggleMenu);
        
        function nextWork() {
            currentIndex = (currentIndex + 1) % works.length;
            renderWork(currentIndex);
        }

        function randomWork() {
            let newIndex = Math.floor(Math.random() * works.length);
            while (newIndex === currentIndex && works.length > 1) {
                newIndex = Math.floor(Math.random() * works.length);
            }
            currentIndex = newIndex;
            renderWork(currentIndex);
        }
        
        function prevWork() {
            currentIndex = (currentIndex - 1 + works.length) % works.length;
            renderWork(currentIndex);
        }
        
        wikiLink.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            window.open(wikiLink.href, '_blank');
        });
        
        document.getElementById('nextBtn').addEventListener('click', randomWork);
        
        document.querySelectorAll('.lang-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                lang = lang === 'en' ? 'ru' : 'en';
                const newText = lang === 'en' ? 'En/Ru' : 'Ru/En';
                document.querySelectorAll('.lang-toggle').forEach(b => b.textContent = newText);
                renderWork(currentIndex);
                if (menuOpen) renderMenu();
            });
        });
        
        const splashLoader = document.getElementById('splashLoader');
        const splashRoulette = document.getElementById('splashRoulette');

        
        function typewriterEffect(element, text) {
            if (!element) return;
            let i = 0;
            function type() {
                if (i <= text.length) {
                    element.textContent = text.substring(0, i);
                    i++;
                    setTimeout(type, 60);
                } else {
                    setTimeout(() => {
                        element.textContent = '';
                        i = 0;
                        setTimeout(type, 1000);
                    }, 2000);
                }
            }
            type();
        }

        function initSplash() {
            // Init loader
            const cardIds = ['card1', 'card2', 'card3', 'card4', 'card5', 'card6', 'card7'];
            const radius = 100;

            cardIds.forEach((id, i) => {
                const card = document.getElementById(id).parentElement;
                const angle = (i / cardIds.length) * 360;
                card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px) translateX(-50%)`;

                const img = document.getElementById(id);
                const workIndex = (currentIndex + i) % works.length;
                const work = works[workIndex];
                const imageSrc = localImages[work.title] || imageCache[work.wikiSearch]?.image;
                if (imageSrc) {
                    img.src = imageSrc;
                }
            });

            const splashTextEl = document.getElementById('splashText');
            if (splashTextEl) {
                typewriterEffect(splashTextEl, 'Learn design together');
            }
        }

        function hideLoader() {
            splashLoader.classList.add('hidden');
            splashRoulette.classList.remove('hidden');
        }

        function startApp() {
            splashRoulette.classList.add('hidden');
            randomWork();
        }

        splashLoader.addEventListener('click', hideLoader);
        splashRoulette.addEventListener('click', startApp);

        initSplash();
        renderWork(currentIndex);
    </script>
</body>
</html>
